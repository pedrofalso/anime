<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/anime-list"></ion-back-button>
    </ion-buttons>
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <h1>Bienvenido a pedro anime List</h1>
      <p>Inicia sesión para gestionar tus listas</p>
    </div>

    <div class="auth-form">
      <ion-item>
        <ion-label position="floating">Nombre de usuario</ion-label>
        <ion-input [(ngModel)]="username" type="text" placeholder="Tu usuario..."></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="Tu contraseña..."></ion-input>
        <ion-button slot="end" fill="clear" (click)="togglePassword()" style="margin-top: auto;">
          <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off' : 'eye'" color="medium"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-text color="danger" *ngIf="error">
        <p>{{ error }}</p>
      </ion-text>

      <ion-button expand="block" (click)="login()" class="submit-btn">Entrar</ion-button>
      
      <ion-button expand="block" fill="outline" color="medium" (click)="loginAsGuest()" style="margin-top: 10px;">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        Entrar como Invitado
      </ion-button>
      
      <div class="auth-footer">
        <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</ion-content>
